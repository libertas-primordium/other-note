<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Other Note Web Preview</title>
    <style>
        :root {
            --background: #050507;
            --surface: #111116;
            --text: #f5f1ff;
            --muted: #b8aec8;
            --accent: #8e44ff;
            --border: #6c4a90;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #root {
            min-height: 100vh;
        }

        .shell {
            width: min(760px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 48px 0;
        }

        .hero {
            padding: 24px 0 20px;
            border-bottom: 1px solid var(--border);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .title {
            margin: 0;
            font-size: clamp(2.25rem, 6vw, 4rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .lede {
            max-width: 620px;
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 1.08rem;
            line-height: 1.55;
        }

        .panel {
            margin-top: 18px;
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .section-title {
            margin: 0 0 10px;
            font-size: 1rem;
            letter-spacing: 0;
        }

        .body {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .method-list {
            display: grid;
            gap: 8px;
            margin: 0;
            padding-left: 20px;
            color: var(--muted);
        }

        .method {
            line-height: 1.45;
        }

        .footer {
            margin: 22px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="other-note-web.js"></script>
</body>
</html>
