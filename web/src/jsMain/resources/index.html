<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss: ws://localhost:* ws://127.0.0.1:* ws://[::1]:*; object-src 'none'; base-uri 'none'; form-action 'none'; worker-src 'none'">
    <title>Other Note Web Preview</title>
    <style>
        :root {
            --background: #050507;
            --surface: #111116;
            --text: #f5f1ff;
            --muted: #b8aec8;
            --accent: #8e44ff;
            --border: #6c4a90;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #root {
            min-height: 100vh;
        }

        .shell {
            width: min(760px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 48px 0;
        }

        .hero {
            padding: 24px 0 20px;
            border-bottom: 1px solid var(--border);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .title {
            margin: 0;
            font-size: clamp(2.25rem, 6vw, 4rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .lede {
            max-width: 620px;
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 1.08rem;
            line-height: 1.55;
        }

        .panel {
            margin-top: 18px;
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .section-title {
            margin: 0 0 10px;
            font-size: 1rem;
            letter-spacing: 0;
        }

        .body {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .small-gap {
            margin-top: 8px;
        }

        .error {
            color: #ff8b8b;
        }

        .action-button {
            min-height: 44px;
            margin-top: 14px;
            padding: 0 16px;
            border: 1px solid var(--accent);
            border-radius: 8px;
            background: var(--accent);
            color: #ffffff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .action-button:disabled {
            border-color: var(--border);
            background: transparent;
            color: var(--muted);
            cursor: not-allowed;
        }

        .field-label {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .field-label-text {
            color: var(--text);
            font-size: 0.92rem;
            font-weight: 700;
        }

        .text-input {
            width: 100%;
            min-height: 44px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #09090d;
            color: var(--text);
            font: inherit;
        }

        .text-input:disabled {
            color: var(--muted);
            cursor: not-allowed;
        }

        .text-input::placeholder {
            color: var(--muted);
        }

        .method-list {
            display: grid;
            gap: 8px;
            margin: 0;
            padding-left: 20px;
            color: var(--muted);
        }

        .method {
            line-height: 1.45;
        }

        .note-list {
            display: grid;
            gap: 14px;
            margin-top: 18px;
        }

        .note-card {
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #09090d;
        }

        .note-title {
            margin: 0;
            color: var(--text);
            font-size: 1.05rem;
            line-height: 1.25;
        }

        .note-snippet,
        .note-meta {
            margin: 8px 0 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .note-meta {
            font-size: 0.82rem;
        }

        .inline-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 12px;
        }

        .inline-actions .action-button {
            margin-top: 0;
        }

        .relay-list {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .relay-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #09090d;
        }

        .relay-url {
            color: var(--text);
            overflow-wrap: anywhere;
        }

        .editor-panel {
            margin-top: 16px;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #09090d;
        }

        .note-editor-input {
            min-height: 220px;
            padding: 12px;
            line-height: 1.5;
            resize: vertical;
        }

        .markdown-view {
            display: grid;
            gap: 10px;
            margin-top: 14px;
            color: var(--text);
        }

        .markdown-heading,
        .markdown-paragraph,
        .markdown-quote,
        .markdown-code-block {
            margin: 0;
            line-height: 1.5;
        }

        .markdown-heading {
            font-size: 1rem;
        }

        .markdown-quote {
            padding-left: 10px;
            border-left: 3px solid var(--accent);
            color: var(--muted);
        }

        .markdown-code-block,
        .inline-code {
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #050508;
            color: var(--text);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        }

        .markdown-code-block {
            overflow-x: auto;
            padding: 10px;
            white-space: pre-wrap;
        }

        .inline-code {
            padding: 1px 4px;
        }

        .footer {
            margin: 22px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="other-note-web.js"></script>
</body>
</html>
