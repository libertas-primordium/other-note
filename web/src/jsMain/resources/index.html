<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Other Note Web Preview</title>
    <style>
        :root {
            --background: #050507;
            --surface: #111116;
            --card-surface: #111116;
            --text: #f5f1ff;
            --muted: #b8aec8;
            --accent: #8e44ff;
            --app-bar: #2a0f45;
            --border: #6c4a90;
            --subtle-border: rgba(108, 74, 144, 0.35);
            --button-text: #ffffff;
            --code-background: #191020;
            --code-text: #e8d7ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--background);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #root {
            min-height: 100vh;
        }

        .shell {
            width: min(760px, calc(100vw - 32px));
            margin: 0 auto;
            padding: 48px 0;
        }

        .signed-in-shell {
            width: min(1280px, calc(100vw - 32px));
            padding: 32px 0 48px;
        }

        .app-header {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            justify-content: space-between;
            padding: 16px 0 12px;
            border-bottom: 1px solid var(--subtle-border);
        }

        .app-header-copy {
            min-width: 0;
        }

        .app-title {
            margin: 0;
            font-size: clamp(1.75rem, 5vw, 2.75rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .profile-name {
            max-width: 100%;
            margin: 10px 0 2px;
            color: var(--text);
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.25;
            overflow: hidden;
            overflow-wrap: anywhere;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .profile-line {
            max-width: 100%;
            margin-top: 2px;
            overflow: hidden;
            overflow-wrap: anywhere;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .profile-about {
            display: -webkit-box;
            max-width: min(760px, 100%);
            margin-top: 4px;
            overflow: hidden;
            overflow-wrap: anywhere;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }

        .hero {
            padding: 24px 0 20px;
            border-bottom: 1px solid var(--border);
        }

        .eyebrow {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .title {
            margin: 0;
            font-size: clamp(2.25rem, 6vw, 4rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .lede {
            max-width: 620px;
            margin: 18px 0 0;
            color: var(--muted);
            font-size: 1.08rem;
            line-height: 1.55;
        }

        .panel {
            margin-top: 18px;
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--subtle-border);
            border-radius: 8px;
        }

        .notes-panel {
            min-width: 0;
            max-width: 100%;
            margin-top: 14px;
            padding: 0;
            background: transparent;
            border: 0;
            border-radius: 0;
        }

        .section-title {
            margin: 0 0 10px;
            font-size: 1rem;
            letter-spacing: 0;
        }

        .body {
            margin: 0;
            color: var(--muted);
            line-height: 1.55;
            overflow-wrap: anywhere;
        }

        .small-gap {
            margin-top: 8px;
        }

        .error {
            color: #ff8b8b;
        }

        .action-button {
            min-height: 40px;
            margin-top: 12px;
            padding: 0 14px;
            border: 1px solid var(--accent);
            border-radius: 8px;
            background: var(--accent);
            color: var(--button-text);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .action-button:disabled {
            border-color: var(--border);
            background: transparent;
            color: var(--muted);
            cursor: not-allowed;
        }

        .menu-shell {
            position: relative;
            flex: 0 0 auto;
        }

        .menu-shell .action-button {
            margin-top: 0;
        }

        .menu-popover {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            z-index: 10;
            width: min(240px, calc(100vw - 40px));
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #09090d;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.5);
        }

        .menu-item {
            display: block;
            width: 100%;
            min-height: 40px;
            padding: 0 10px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--text);
            font: inherit;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
        }

        .menu-item:hover,
        .menu-item:focus {
            background: rgba(142, 68, 255, 0.18);
            outline: none;
        }

        .menu-item.danger {
            color: #ffb4b4;
        }

        .menu-divider {
            height: 1px;
            margin: 6px 0;
            background: var(--border);
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.62);
        }

        .modal-panel {
            min-width: 0;
            width: min(680px, 100%);
            max-width: 100%;
            max-height: min(82vh, 720px);
            overflow-x: hidden;
            overflow-y: auto;
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.56);
        }

        .modal-header {
            display: flex;
            min-width: 0;
            max-width: 100%;
            gap: 12px;
            align-items: flex-start;
            justify-content: space-between;
        }

        .modal-header .section-title {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .modal-header .action-button {
            min-height: 38px;
            margin-top: 0;
        }

        .panel-content {
            margin-top: 8px;
        }

        .field-label {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .field-label-text {
            color: var(--text);
            font-size: 0.92rem;
            font-weight: 700;
        }

        .text-input {
            width: 100%;
            min-width: 0;
            max-width: 100%;
            min-height: 44px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #09090d;
            color: var(--text);
            font: inherit;
        }

        .text-input:disabled {
            color: var(--muted);
            cursor: not-allowed;
        }

        .text-input::placeholder {
            color: var(--muted);
        }

        .method-list {
            display: grid;
            gap: 8px;
            margin: 0;
            padding-left: 20px;
            color: var(--muted);
        }

        .method {
            line-height: 1.45;
        }

        .note-list {
            display: flex;
            min-width: 0;
            max-width: 100%;
            gap: 6px;
            margin-top: 14px;
        }

        .note-lanes {
            align-items: flex-start;
        }

        .note-lane {
            display: grid;
            flex: 1 1 0;
            min-width: 0;
            max-width: 100%;
            gap: 6px;
        }

        .note-card {
            display: grid;
            width: 100%;
            align-self: start;
            break-inside: avoid;
            page-break-inside: avoid;
            min-width: 0;
            max-width: 100%;
            padding: 10px;
            border: 1px solid var(--subtle-border);
            border-radius: 8px;
            background: var(--card-surface);
            overflow-wrap: anywhere;
        }

        .note-card-open {
            min-width: 0;
            max-width: 100%;
            border-radius: 6px;
            cursor: pointer;
            overflow-wrap: anywhere;
        }

        .note-card-open:focus {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .note-title {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            margin: 0;
            color: var(--text);
            font-size: 0.875rem;
            font-weight: 700;
            line-height: 1.22;
            overflow: hidden;
            overflow-wrap: anywhere;
        }

        .note-snippet,
        .note-meta {
            margin: 6px 0 0;
            color: var(--muted);
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .note-snippet {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 4;
            font-size: 0.75rem;
            overflow: hidden;
        }

        .note-meta {
            font-size: 0.6875rem;
        }

        .inline-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 12px;
        }

        .inline-actions .action-button {
            margin-top: 0;
        }

        .notes-actions {
            margin-top: 14px;
        }

        .note-card-actions {
            flex-direction: row;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 10px;
        }

        .note-card-actions .action-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            min-height: 34px;
            padding: 0 10px;
            border-color: rgba(142, 68, 255, 0.68);
            border-radius: 7px;
            background: rgba(142, 68, 255, 0.08);
            color: var(--accent);
            font-size: 0.75rem;
            line-height: 1;
            white-space: nowrap;
        }

        .note-card-actions .action-button:last-child {
            border-color: rgba(255, 139, 139, 0.58);
            background: rgba(255, 139, 139, 0.06);
            color: #ffb4b4;
        }

        .note-card-actions .action-button:hover,
        .note-card-actions .action-button:focus {
            border-color: var(--accent);
            background: rgba(142, 68, 255, 0.18);
            outline: none;
        }

        .relay-list {
            display: grid;
            gap: 8px;
            margin-top: 14px;
        }

        .relay-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #09090d;
        }

        .relay-url {
            color: var(--text);
            overflow-wrap: anywhere;
        }

        .editor-panel {
            min-width: 0;
            max-width: 100%;
            margin-top: 16px;
            padding: 14px;
            border: 1px solid var(--subtle-border);
            border-radius: 8px;
            background: var(--card-surface);
        }

        .note-editor-input {
            min-height: 220px;
            padding: 12px;
            line-height: 1.5;
            resize: vertical;
        }

        .note-detail-panel {
            min-width: 0;
            width: min(760px, 100%);
            max-width: 100%;
            overflow-x: hidden;
        }

        .note-detail-body {
            min-width: 0;
            max-width: 100%;
            margin-top: 14px;
            overflow-x: hidden;
            overflow-wrap: anywhere;
        }

        .note-detail-body .markdown-view {
            display: block;
            min-width: 0;
            max-width: 100%;
            overflow-x: hidden;
            overflow-wrap: anywhere;
        }

        .note-detail-body .markdown-heading,
        .note-detail-body .markdown-paragraph,
        .note-detail-body .markdown-quote,
        .note-detail-body .markdown-code-block,
        .note-detail-body .inline-code {
            min-width: 0;
            max-width: 100%;
            overflow-x: hidden;
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .note-detail-body .markdown-view > * + * {
            margin-top: 8px;
        }

        .markdown-view {
            display: grid;
            min-width: 0;
            max-width: 100%;
            gap: 8px;
            margin-top: 10px;
            color: var(--text);
            overflow-x: hidden;
            overflow-wrap: anywhere;
        }

        .markdown-heading,
        .markdown-paragraph,
        .markdown-quote,
        .markdown-code-block {
            min-width: 0;
            max-width: 100%;
            margin: 0;
            line-height: 1.5;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .markdown-paragraph,
        .markdown-quote {
            white-space: pre-wrap;
        }

        .markdown-heading {
            font-size: 1rem;
        }

        .markdown-quote {
            padding-left: 10px;
            border-left: 3px solid var(--accent);
            color: var(--muted);
        }

        .markdown-code-block,
        .inline-code {
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--code-background);
            color: var(--code-text);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
            overflow-wrap: anywhere;
        }

        .markdown-code-block {
            min-width: 0;
            max-width: 100%;
            overflow-x: hidden;
            overflow-wrap: anywhere;
            padding: 10px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .inline-code {
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
            padding: 1px 4px;
        }

        .footer {
            margin: 22px 0 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        @media (max-width: 560px) {
            .shell {
                width: min(100vw - 24px, 760px);
                padding: 28px 0;
            }

            .signed-in-shell {
                width: min(100vw - 24px, 1280px);
            }

            .app-header {
                align-items: stretch;
                flex-direction: column;
            }

            .menu-popover {
                left: 0;
                right: auto;
            }

            .note-card-actions {
                align-items: center;
                flex-direction: row;
                gap: 6px;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="other-note-web.js"></script>
</body>
</html>
